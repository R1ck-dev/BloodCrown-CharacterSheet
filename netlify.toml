[build]
  base    = "frontend"
  publish = "dist"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: React Router gerencia /dashboard, /sheet/:id etc em runtime —
# sem este redirect, refresh direto na URL devolve 404 do Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
