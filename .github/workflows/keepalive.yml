name: Keepalive Render

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Pingar /actuator/health
        run: |
          curl -fsS --max-time 90 --retry 3 --retry-delay 10 \
            https://bloodcrown-api.onrender.com/actuator/health
