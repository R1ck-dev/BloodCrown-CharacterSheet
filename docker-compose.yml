version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bloodcrown-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: bloodcrown_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin_password
    ports:
      # 3307 externo evita conflito com MySQL nativo do Windows na porta 3306.
      # Backend dentro do compose ainda usa 3306 (porta interna do container).
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Garante que o backend só inicia quando o MySQL responder a "ping" — sem
    # isso, o Spring Boot pode tentar conectar antes do DB terminar de subir e
    # morrer com "Communications link failure".
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: bloodcrown-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/bloodcrown_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin_password
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Segredo JWT - exigido. Crie um arquivo .env na raiz copiando .env.example
      # e defina JWT_SECRET com um valor proprio (ver instrucoes no .env.example).
      # Em producao (Render), defina JWT_SECRET no painel de variaveis de ambiente.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET nao definido. Crie .env na raiz a partir de .env.example e defina JWT_SECRET=<valor-aleatorio>.}

  frontend:
    build: ./frontend
    container_name: bloodcrown-web
    ports:
      - "80:80"
    # O Dockerfile agora e multi-stage: stage Node roda "npm run build" e gera dist/,
    # stage nginx serve apenas o build estatico. Para hot-reload em dev, use
    # "npm run dev" diretamente no host (porta 5500) - o CORS do backend ja libera.
    depends_on:
      - backend

volumes:
  mysql_data: