spring.application.name=bloodcrown-cs

spring.datasource.url=jdbc:mysql://localhost:3306/bloodcrown-cs?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}

# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Quem gerencia o schema agora e o Flyway (db/migration). O Hibernate so VALIDA que as
# entidades batem com o banco no boot (nunca altera). Se houver drift entidade<->banco o app
# falha rapido no startup — por isso valide contra uma copia do schema de prod antes do deploy.
spring.jpa.hibernate.ddl-auto=validate
# OSIV desligado: evita Hibernate Session aberta na thread da view, libera conexao antes do render.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Flyway: versiona o schema via scripts em classpath:db/migration (V1, V2, ...).
# baseline-on-migrate: o banco de prod ja existe e foi criado pelo ddl-auto=update. No 1o boot
# o Flyway encontra o schema sem a tabela de controle, cria a flyway_schema_history e marca a
# v1 (baseline) como aplicada SEM rodar o V1__baseline_schema.sql. Em banco vazio (local/CI) o
# V1 roda normal e cria o schema. clean-disabled: trava o flyway:clean (destrutivo) por seguranca.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline schema (pre-flyway, gerado por ddl-auto=update)
spring.flyway.clean-disabled=true

# HikariCP minimalista: trafego baixo (1-poucos usuarios), evita conexoes idle consumindo RAM no Aiven free.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=300000

# Lazy init: difere a criacao de beans nao usados no boot, corta tempo de cold start no Render.
spring.main.lazy-initialization=true

# Actuator: expoe so /health (usado pelo keepalive do GitHub Actions); evita info/metrics no escopo publico.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Gzip nas respostas JSON: ficha completa de ~10KB cai pra ~2KB on the wire.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Cache JVM em memoria com Caffeine: leitura de folders/refs vai direto da JVM
# apos 1a chamada, sem hit no banco. TTL 5min, ate 200 entries por cache.
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=300s

# CORS: origens permitidas, separadas por virgula. Externalizado do codigo (SecurityConfig)
# para que adicionar uma origem (ex.: novo dominio de deploy) seja mudanca de config, nao de
# codigo. Em prod (Render) pode-se sobrescrever via env APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=http://localhost,http://localhost:5173,http://localhost:5500,http://localhost:8080,http://127.0.0.1,http://127.0.0.1:5173,http://127.0.0.1:5500,https://bloodcrown.netlify.app

# Cloudflare R2 (S3-compativel): storage das imagens de mapa/token, fora do banco Aiven.
# O presign e offline (assina local, sem rede), entao estes placeholders permitem o boot e o
# fluxo local SEM R2 real (use o fallback PUT /mesas/{id}/mapa com uma URL de imagem qualquer).
# Em prod, sobrescreva via env: APP_STORAGE_R2_ENDPOINT, _ACCESS_KEY, _SECRET_KEY, _BUCKET,
# _PUBLIC_BASE_URL. O bucket precisa de leitura publica (r2.dev/dominio) pro <img> renderizar.
app.storage.r2.endpoint=${APP_STORAGE_R2_ENDPOINT:https://example.r2.cloudflarestorage.com}
app.storage.r2.bucket=${APP_STORAGE_R2_BUCKET:bloodcrown}
app.storage.r2.access-key=${APP_STORAGE_R2_ACCESS_KEY:local}
app.storage.r2.secret-key=${APP_STORAGE_R2_SECRET_KEY:local}
app.storage.r2.public-base-url=${APP_STORAGE_R2_PUBLIC_BASE_URL:https://example.r2.dev}

# Profile padrao = local (dev). Em producao (Render) e sobrescrito via env: SPRING_PROFILES_ACTIVE=prod.
# show-sql/format_sql ficam em application-local.properties para nao vazar queries em log de producao.
spring.profiles.active=local
