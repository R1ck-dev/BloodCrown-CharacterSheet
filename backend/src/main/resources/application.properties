spring.application.name=bloodcrown-cs

spring.datasource.url=jdbc:mysql://localhost:3306/bloodcrown-cs?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}

# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# OSIV desligado: evita Hibernate Session aberta na thread da view, libera conexao antes do render.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# HikariCP minimalista: trafego baixo (1-poucos usuarios), evita conexoes idle consumindo RAM no Aiven free.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=300000

# Lazy init: difere a criacao de beans nao usados no boot, corta tempo de cold start no Render.
spring.main.lazy-initialization=true

# Actuator: expoe so /health (usado pelo keepalive do GitHub Actions); evita info/metrics no escopo publico.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Profile padrao = local (dev). Em producao (Render) e sobrescrito via env: SPRING_PROFILES_ACTIVE=prod.
# show-sql/format_sql ficam em application-local.properties para nao vazar queries em log de producao.
spring.profiles.active=local
